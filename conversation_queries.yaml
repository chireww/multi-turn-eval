# ============================================================
# 多轮对话评测用例
# ============================================================
# 每个 scenario 是一个完整的对话场景
# turns: 每一轮的用户输入 + 期望的行为描述

scenarios:

  - id: MC001
    name: "指代消解——代词追踪"
    layer: L1
    description: "用户第一轮提到具体对象，第二轮用代词指代，检查系统是否理解指代"
    turns:
      - user: "替雷利珠单抗药品的不良反应有哪些？"
        expect: "系统应列出替雷利珠单抗药的不良反应"
        check_points:
          - "答案提到了不良反应"
      - user: "它的发生率是多少？"
        expect: "系统应理解'它'指的是替雷利珠单抗药品，回答替雷利珠单抗药不良反应的发生率"
        check_points:
          - "答案关联了上一轮提到的药品"
          - "答案提到了发生率数据"
      - user: "这个数据可靠吗？"
        expect: "系统应理解'这个数据'指的是上一轮的发生率数据"
        check_points:
          - "答案关联了发生率数据"

  - id: MC002
    name: "上下文延续——需要跨轮记忆"
    layer: L1
    description: "系统需要记住前文才有意义地回答后续问题"
    turns:
      - user: "胃癌怎么治疗？"
        expect: "系统回答胃癌的治疗方案"
        check_points:
          - "答案提到了治疗方案"
      - user: "刚才提到的方案里，首选的是什么？"
        expect: "系统应从第一轮回答中提取首选方案"
        check_points:
          - "答案关联了上一轮提到的治疗方案"
          - "答案明确了首选"
      - user: "首选方案有什么副作用？"
        expect: "系统应记得前两轮的上下文，回答首选方案的副作用"
        check_points:
          - "答案与首选方案相关"
          - "答案提到了副作用"

  - id: MC003
    name: "话题切换——不污染上下文"
    layer: L2
    description: "连续聊一个话题后突然切换，新话题不应受旧话题干扰"
    turns:
      - user: "胃癌的治疗方案有哪些？"
        expect: "正常回答胃癌治疗"
      - user: "手术后的护理注意事项是什么？"
        expect: "仍在胃癌话题内"
      - user: "实验室怎么进入？"
        expect: "系统应切换到实验室话题，上一句的胃癌术后护理不应出现在答案里"
        check_points:
          - "答案与实验室相关"
          - "答案不包含胃癌、手术、护理等前文词汇"

  - id: MC004
    name: "用户纠错——系统认错并修正"
    layer: L2
    description: "用户纠正系统或自己的错误，系统应正确响应"
    turns:
      - user: "妥诺达非药的用法用量是什么？"
        expect: "系统回答用法用量"
      - user: "不对，我问的是妥诺达非对老年人的用量"
        expect: "系统应针对老年人用量重新回答"
        check_points:
          - "答案提到了老年人用量"

  - id: MC005
    name: "空召回后的追问——兜底后不瞎编"
    layer: L2
    description: "系统第一次说不知道后，用户继续追问，系统不应开始编造"
    turns:
      - user: "今天天气怎么样？"
        expect: "系统回答不知道（知识库无相关内容）"
      - user: "那明天呢？"
        expect: "系统仍应诚实回答不知道，不应因为用户追问就开始编造天气信息"
        check_points:
          - "答案没有编造任何天气信息"

  - id: MC006
    name: "空召回后的追问——兜底后不瞎编"
    layer: L2
    description: "系统第一次说不知道后，用户继续追问，系统不应开始编造"
    turns:
      - user: "今天天气怎么样？"
        expect: "系统回答不知道（知识库无相关内容）"
      - user: "那明天呢？"
        expect: "系统仍应诚实回答不知道，不应因为用户追问就开始编造天气信息"
        check_points:
          - "答案没有编造任何天气信息"

  # ---- L2: 扩展场景 ----
  - id: MC007
    name: "多跳推理——跨文档关联追问"
    layer: L2
    description: "用户先问A药，再问副作用，再问最严重的，需要跨轮关联"
    turns:
      - user: "妥诺达非是什么药？"
        expect: "系统介绍妥诺达非的基本信息"
        check_points:
          - "答案提到了免疫治疗"
      - user: "它有什么副作用？"
        expect: "系统应理解'它'=妥诺达非，列出该药的副作用"
        check_points:
          - "答案关联了妥诺达非"
      - user: "刚才提到的副作用里，哪个最严重？"
        expect: "系统应回顾上一轮列出的副作用，指出最严重的"
        check_points:
          - "答案回顾了之前提到的副作用"
          - "答案明确了严重程度排序"

  - id: MC008
    name: "歧义澄清——问题模糊时追问而非瞎猜"
    layer: L2
    description: "用户问题模糊，系统应追问澄清"
    turns:
      - user: "那个药怎么用？"
        expect: "系统应追问用户具体是哪个药，而不是随机猜"
        check_points:
          - "答案包含追问或澄清"
      - user: "就是胃癌术前用的免疫药"
        expect: "系统根据补充信息定位到正确的药品"
        check_points:
          - "答案定位到了胃癌术前免疫治疗药物"

  - id: MC009
    name: "长对话记忆——5轮内信息不丢失"
    layer: L2
    description: "系统应在后面的轮次仍记得前面确认过的关键信息"
    turns:
      - user: "我有个局部进展期胃癌的患者"
        expect: "系统记住患者背景"
      - user: "可以用免疫治疗吗？"
        expect: "系统结合第一轮的病期给出建议"
        check_points:
          - "答案针对局部进展期胃癌"
      - user: "具体用什么方案？"
        expect: "系统给出具体的免疫联合化疗方案"
        check_points:
          - "答案包含了具体的药物名称或方案"
      - user: "这个方案的副作用大吗？"
        expect: "系统应记得前一轮提到的方案，回答该方案的副作用"
        check_points:
          - "答案关联了前一轮的化疗方案"
      - user: "那还是换一种吧，有没有副作用小一点的？"
        expect: "系统仍应记得患者是局部进展期胃癌，在此基础上推荐替代方案"
        check_points:
          - "答案仍针对局部进展期胃癌"